<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predicció Cabal — Riu Llobregat</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset i tokens ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #1e2631;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --blue:        #2f81f7;
      --blue-dim:    #1a3a5c;
      --green:       #3fb950;
      --green-dim:   #1a3a24;
      --yellow:      #d29922;
      --yellow-dim:  #3a2e0a;
      --orange:      #e07b3a;
      --orange-dim:  #3a1e0a;
      --red:         #f85149;
      --red-dim:     #3a1a1a;
      --radius:      10px;
      --font:        'Inter', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .header-icon {
      width: 40px; height: 40px;
      background: var(--blue-dim);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
    h1 span { color: var(--blue); }

    .header-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse.error { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Layout principal ────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr;
      height: calc(100vh - 69px);
    }

    /* ── Mapa ────────────────────────────────────── */
    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Panell lateral ──────────────────────────── */
    #panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Targeta de punt ─────────────────────────── */
    .punt-card {
      border-bottom: 1px solid var(--border);
      padding: 18px 18px 20px;
    }

    .punt-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; cursor: pointer; }
    .punt-content { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
    .punt-content.obert { max-height: 600px; }
    .punt-chevron { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.25s; margin-left: 8px; }
    .punt-chevron.obert { transform: rotate(180deg); }

    .punt-nom {
      font-size: 0.95rem;
      font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }

    .punt-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }

    .punt-ts {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 3px;
    }

    .risc-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .risc-NORMAL          { background: var(--green-dim);  color: var(--green); }
    .risc-CARREGA_ELEVADA { background: var(--yellow-dim); color: var(--yellow); }
    .risc-ALERTA          { background: var(--orange-dim); color: var(--orange); }
    .risc-ALERTA_MAXIMA   { background: var(--red-dim);    color: var(--red); }

    /* Graella de prediccions */
    .pred-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .pred-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 6px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .pred-cell.critic {
      border-color: var(--red);
      background: var(--red-dim);
    }

    .pred-hores {
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .pred-hora {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .pred-cabal {
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
    }
    .pred-cell.critic .pred-cabal { color: var(--red); }
    .pred-unitat {
      font-size: 0.58rem;
      color: var(--text-muted);
    }
    .pred-model {
      font-size: 0.55rem;
      color: var(--text-muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Gràfica */
    .chart-wrap {
      position: relative;
      height: 130px;
    }

    /* ── Peu del panell ──────────────────────────── */
    .panel-footer {
      padding: 12px 18px;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Marcadors Leaflet personalitzats ────────── */
    .marker-wrap {
      display: flex; flex-direction: column; align-items: center;
    }
    .marker-bubble {
      background: var(--surface);
      border: 2px solid var(--blue);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      white-space: nowrap;
      font-family: var(--font);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      cursor: pointer;
      min-width: 130px;
    }
    .marker-bubble.critic { border-color: var(--red); }
    .marker-nom  { font-size: 0.7rem; font-weight: 600; color: #e6edf3; }
    .marker-val  { font-size: 1.05rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #2f81f7; }
    .marker-bubble.critic .marker-val { color: var(--red); }
    .marker-sub  { font-size: 0.6rem; color: #7d8590; }
    .marker-risc { font-size: 0.62rem; font-weight: 700; margin-top: 2px; }
    .marker-risc.NORMAL { color: var(--green); }
    .marker-risc.CRITIC { color: var(--red); }
    .marker-stem { width: 2px; height: 10px; background: var(--blue); }
    .marker-bubble.critic + .marker-stem { background: var(--red); }
    .marker-pin  { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
    .marker-bubble.critic ~ .marker-pin { background: var(--red); }

    /* ── No data ─────────────────────────────────── */
    .no-data {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* ── Scrollbar ───────────────────────────────── */
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; height: auto; }
      #panel { max-height: 60vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🌊</div>
    <div>
      <h1>Predicció Cabal — Riu <span>Llobregat</span></h1>
      <div class="header-meta" id="header-ts">Carregant dades...</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="pulse" id="pulse-dot"></div>
    <span id="status-text">Connectant...</span>
  </div>
</header>

<main>
  <div id="map"></div>
  <div id="panel">
    <div class="no-data" id="loading-msg">⏳ Carregant prediccions...</div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────
//  CONFIGURACIÓ
// ─────────────────────────────────────────────

// URL del data.json al GitHub Pages (raw)
// Format: https://raw.githubusercontent.com/alexrodriguezmolla/REPO/main/data.json
const DATA_URL = "https://raw.githubusercontent.com/alexrodriguezmolla/llobregat-prediccio/main/data.json";

const INTERVAL_REFRESC_MS = 30 * 60 * 1000; // 30 minuts

function calcularNivell(cabal, llindars) {
    if (!llindars) return "NORMAL";
    if (cabal >= llindars.ALERTA_MAXIMA) return "ALERTA_MAXIMA";
    if (cabal >= llindars.ALERTA)        return "ALERTA";
    if (cabal >= llindars.CARREGA_ELEVADA) return "CARREGA_ELEVADA";
    return "NORMAL";
}

const CONFIG_NIVELL = {
    NORMAL:           { label: "✓ NORMAL",        color: "var(--green)",  colorDim: "var(--green-dim)" },
    CARREGA_ELEVADA:  { label: "↑ CÀRREGA ELEVADA", color: "var(--yellow)", colorDim: "var(--yellow-dim)" },
    ALERTA:           { label: "⚠ ALERTA",         color: "var(--orange)", colorDim: "var(--orange-dim)" },
    ALERTA_MAXIMA:    { label: "🔴 ALERTA MÀXIMA",  color: "var(--red)",    colorDim: "var(--red-dim)" }
};

// ─────────────────────────────────────────────
//  MAPA
// ─────────────────────────────────────────────

const map = L.map("map", { center: [41.43, 1.97], zoom: 11, zoomControl: true });

function escalaPerZoom() {
  const z = map.getZoom();
  // A zoom 13+ escala 1; per cada nivell menys, redueix un 15%
  return Math.max(0.45, Math.min(1, 1 - (13 - z) * 0.15));
}
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

const markers = {};

function trobarPredDestacada(punt) {
  // Retorna la predicció a mostrar al mapa:
  // la primera que arribi a ALERTA o ALERTA_MAXIMA, si no n'hi ha cap, la de cabal més alt
  for (let i = 0; i < punt.prediccions.length; i++) {
    const p = punt.prediccions[i];
    const nivell = calcularNivell(p.cabal_m3s, punt.llindars);
    if (nivell === "ALERTA" || nivell === "ALERTA_MAXIMA") return p;
  }
  return punt.prediccions.reduce((max, p) => p.cabal_m3s > max.cabal_m3s ? p : max, punt.prediccions[0]);
}

function crearIconaMarker(punt) {
  if (!punt.prediccions || punt.prediccions.length === 0) return null;
  const pDestacada = trobarPredDestacada(punt);
  const nivell = calcularNivell(pDestacada.cabal_m3s, punt.llindars);
  const esCrit = nivell === "ALERTA" || nivell === "ALERTA_MAXIMA";
  const escala = escalaPerZoom();
  const html   = `<div class="marker-wrap" style="transform:scale(${escala});transform-origin:bottom center;">
    <div class="marker-bubble ${esCrit ? "critic" : ""}">
      <div class="marker-nom">${punt.nom}</div>
      <div class="marker-val">${pDestacada.cabal_m3s.toFixed(1)}</div>
      <div class="marker-sub">m\u00b3/s \u00b7 +${pDestacada.hores_vista}h (${pDestacada.hora_prediccio})</div>
      <div class="marker-risc ${esCrit ? "CRITIC" : "NORMAL"}">${CONFIG_NIVELL[nivell].label}</div>
    </div>
    <div class="marker-stem"></div>
    <div class="marker-pin"></div>
  </div>`;
  return L.divIcon({ html, className: "", iconAnchor: [65, 72] });
}

const markersEmb = {};

function actualitzarMarcadors(dades) {
  // ── Embassaments ──
  if (dades.embassaments) {
    dades.embassaments.forEach(emb => {
      const pct  = emb.pct_omplim != null ? emb.pct_omplim.toFixed(1) : "—";
      const vol  = emb.volum_hm3  != null ? emb.volum_hm3.toFixed(2)  : "—";
      const color = emb.pct_omplim == null ? "#7d8590" :
                    emb.pct_omplim > 70 ? "#3fb950" :
                    emb.pct_omplim > 40 ? "#d29922" : "#f85149";
      const escala = escalaPerZoom();
      const html = `<div class="marker-wrap" style="transform:scale(${escala});transform-origin:bottom center;">
        <div class="marker-bubble" style="min-width:120px">
          <div class="marker-nom">${emb.nom}</div>
          <div class="marker-val">${vol} hm\u00b3</div>
          <div class="marker-sub">${pct}% del total</div>
        </div>
          <div class="marker-stem" style="background:${color}"></div>
          <div class="marker-pin" style="background:${color}"></div>
        </div>`;
      const icona = L.divIcon({ html, className: "", iconAnchor: [60, 72] });
      const latlng = [emb.coord.lat, emb.coord.lon];
      if (markersEmb[emb.nom]) {
        markersEmb[emb.nom].setLatLng(latlng).setIcon(icona);
      } else {
        markersEmb[emb.nom] = L.marker(latlng, { icon: icona }).addTo(map);
      }
    });
  }

  // ── Punts de predicció ──
  dades.punts.forEach(punt => {
    const icona = crearIconaMarker(punt);
    if (!icona) return;
    const latlng = [punt.coord.lat, punt.coord.lon];
    if (markers[punt.id]) {
      markers[punt.id].setLatLng(latlng).setIcon(icona);
    } else {
      markers[punt.id] = L.marker(latlng, { icon: icona }).addTo(map);
    }
    markers[punt.id].on("click", () => {
      document.getElementById(`card-${punt.id}`)?.scrollIntoView({ behavior: "smooth" });
    });
  });
}

// ─────────────────────────────────────────────
//  PANELL LATERAL
// ─────────────────────────────────────────────

const charts = {};

function renderitzarPanell(dades) {
  const panel = document.getElementById("panel");
  panel.innerHTML = "";

  dades.punts.forEach(punt => {
    // Comprovar si les dades tenen més de 6 hores
    const ara = new Date();
    const tsFitxer = punt.timestamp_fitxer ? new Date(punt.timestamp_fitxer) : null;
    const horesAntig = tsFitxer ? (ara - tsFitxer) / 3600000 : 999;
    const dadesAntigues = horesAntig > 6;

    if (!punt.prediccions || punt.prediccions.length === 0 || dadesAntigues) {
      const div = document.createElement("div");
      div.className = "punt-card";
      div.id = `card-${punt.id}`;
      div.innerHTML = `
        <div class="punt-header">
          <div>
            <div class="punt-nom"><span class="punt-dot"></span>${punt.nom}</div>
            <div class="punt-ts">${dadesAntigues ? `Dades desactualitzades (fa ${Math.floor(horesAntig)}h)` : "Sense dades disponibles"}</div>
          </div>
        </div>
        <div class="no-data">${dadesAntigues ? "⏳ Esperant nova predicció..." : "Cap fitxer de predicció trobat"}</div>`;
      panel.appendChild(div);
      return;
    }

    // Risc màxim de les 6 prediccions
    const riscos   = punt.prediccions.map(p => p.risc.toUpperCase());
    const riscMax  = riscos.includes("CRÍTIC") || riscos.includes("CRITIC") ? "CRITIC" : "NORMAL";
    const tsNet    = punt.timestamp_fitxer
      ? new Date(punt.timestamp_fitxer).toLocaleString("ca-ES", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" })
      : "—";

    

    // ── Graella de prediccions ──
    let cellesHTML = punt.prediccions.map(p => {
      const nivell = calcularNivell(p.cabal_m3s, punt.llindars);
      const cfg    = CONFIG_NIVELL[nivell];
      return `
        <div class="pred-cell" style="border-color:${cfg.color};background:${cfg.colorDim}">
          <div class="pred-hores">+${p.hores_vista}h</div>
          <div class="pred-hora">${p.hora_prediccio}</div>
          <div class="pred-cabal">${p.cabal_m3s.toFixed(1)}</div>
          <div class="pred-unitat">m³/s</div>
          <div class="pred-model">${p.model}</div>
        </div>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "punt-card";
    card.id = "card-" + punt.id;
    card.innerHTML =
      '<div class="punt-header" id="header-' + punt.id + '"><div>' +
      '<div class="punt-nom"><span class="punt-dot" style="background:' + (riscMax === "CRITIC" ? "var(--red)" : "var(--blue)") + '"></span>' + punt.nom + '</div>' +
      '<div class="punt-ts">' + tsNet + '</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;">' +
      '<span class="risc-badge risc-' + riscMax + '">' + (riscMax === "CRITIC" ? "⚠ CRÍTIC" : "✓ NORMAL") + '</span>' +
      '<span class="punt-chevron" id="chevron-' + punt.id + '">▾</span>' +
      '</div>' +
      '</div>' +
      '<div class="punt-content" id="content-' + punt.id + '">' +
      '<div class="pred-grid">' + cellesHTML + '</div>' +
      (punt.cabal_actual != null ? '<div class="cabal-actual-box"><div class="cabal-actual-label">Cabal actual</div><div class="cabal-actual-val">' + punt.cabal_actual.toFixed(2) + '</div><div class="cabal-actual-unit">m\u00b3/s</div></div>' : '') +
      '<div class="chart-wrap"><canvas id="chart-' + punt.id + '"></canvas></div>' +
(() => {
  if (!punt.ultima_dada_api) return '';
  const horaAPI = new Date(punt.ultima_dada_api).toLocaleString("ca-ES", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
  return '<div style="font-size:0.68rem;color:var(--text-muted);padding:6px 2px 2px;font-family:var(--mono);">Última dada API: ' + horaAPI + '</div>';
})() +
'</div>';

    panel.appendChild(card);

    document.getElementById("header-" + punt.id).addEventListener("click", function() {
      const content = document.getElementById("content-" + punt.id);
      const chevron = document.getElementById("chevron-" + punt.id);
      content.classList.toggle("obert");
      chevron.classList.toggle("obert");
      if (content.classList.contains("obert") && charts[punt.id]) {
        setTimeout(function() { charts[punt.id].resize(); }, 310);
      }
    });

    // ── Gràfica ──
    const cabalAra = punt.cabal_actual;
    const ctx    = document.getElementById(`chart-${punt.id}`).getContext("2d");
    const labelAra = cabalAra != null ? [`+0h\nara`] : [];
    const valAra   = cabalAra != null ? [cabalAra] : [];
    const colorAra = cabalAra != null ? ["rgba(125,133,144,0.7)"] : [];

    const labels = [...labelAra, ...punt.prediccions.map(p => `+${p.hores_vista}h\n${p.hora_prediccio}`)];
    const vals   = [...valAra,   ...punt.prediccions.map(p => p.cabal_m3s)];
    const colors = [...colorAra, ...punt.prediccions.map(p => {
      const nivell = calcularNivell(p.cabal_m3s, punt.llindars);
      return nivell === "ALERTA_MAXIMA"    ? "rgba(248,81,73,0.85)" :
             nivell === "ALERTA"           ? "rgba(224,123,58,0.85)" :
             nivell === "CARREGA_ELEVADA"  ? "rgba(210,153,34,0.85)" :
                                             "rgba(47,129,247,0.85)";
    })];
    const llindar = punt.llindars?.ALERTA_MAXIMA ?? 999;

    if (charts[punt.id]) charts[punt.id].destroy();
    charts[punt.id] = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
         {
            label: "Cabal predit (m³/s)",
            data: vals,
            backgroundColor: colors,
            borderRadius: 4,
            borderSkipped: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.parsed.y.toFixed(2)} m³/s`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: "#7d8590", font: { size: 9, family: "JetBrains Mono" } },
            grid:  { color: "#21262d" }
          },
          y: {
            min: 0,
            max: (() => {
              const maxVal = Math.max(...vals);
              const seg = Math.ceil(maxVal / 10) * 10;
              return (seg - maxVal) < 1 ? seg + 10 : seg;
            })(),
            ticks: { color: "#7d8590", font: { size: 9, family: "JetBrains Mono" } },
            grid:  { color: "#21262d" }
          }
        }
      }
    });
  });

  // Peu del panell
  const footer = document.createElement("div");
  footer.className = "panel-footer";
  const seg = Math.round(INTERVAL_REFRESC_MS / 60000);
  footer.innerHTML = `🔄 S'actualitza cada ${seg} min · Dades: <a href="${DATA_URL}" target="_blank" style="color:var(--blue);text-decoration:none;">data.json</a>`;

  
  panel.appendChild(footer);
}

// ─────────────────────────────────────────────
//  CÀRREGA DE DADES
// ─────────────────────────────────────────────

async function carregarDades() {
  try {
    const r = await fetch(DATA_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const dades = await r.json();
    ultimesDades = dades;
    actualitzarMarcadors(dades);
    renderitzarPanell(dades);

    const ts = new Date(dades.actualitzat).toLocaleString("ca-ES");
    document.getElementById("header-ts").textContent = `Última actualització: ${ts} UTC`;
    document.getElementById("status-text").textContent = "En línia";
    document.getElementById("pulse-dot").className = "pulse";

  } catch (err) {
    console.error("Error carregant dades:", err);
    document.getElementById("status-text").textContent = "Error de connexió";
    document.getElementById("pulse-dot").className = "pulse error";
    document.getElementById("header-ts").textContent = "No s'han pogut carregar les dades";
  }
}

// Càrrega inicial + interval
carregarDades();
setInterval(carregarDades, INTERVAL_REFRESC_MS);

let ultimesDades = null;
map.on("zoomend", function() {
  if (ultimesDades) actualitzarMarcadors(ultimesDades);
});
</script>
