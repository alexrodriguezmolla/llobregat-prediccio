<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predicció Cabal — Riu Llobregat</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset i tokens ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #1e2631;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --blue:        #2f81f7;
      --blue-dim:    #1a3a5c;
      --green:       #3fb950;
      --green-dim:   #1a3a24;
      --red:         #f85149;
      --red-dim:     #3a1a1a;
      --orange:      #d29922;
      --radius:      10px;
      --font:        'Inter', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .header-icon {
      width: 40px; height: 40px;
      background: var(--blue-dim);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
    h1 span { color: var(--blue); }

    .header-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse.error { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Layout principal ────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr;
      height: calc(100vh - 69px);
    }

    /* ── Mapa ────────────────────────────────────── */
    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Panell lateral ──────────────────────────── */
    #panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Targeta de punt ─────────────────────────── */
    .punt-card {
      border-bottom: 1px solid var(--border);
      padding: 18px 18px 20px;
    }

    .punt-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .punt-nom {
      font-size: 0.95rem;
      font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }

    .punt-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
    }

    .punt-ts {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 3px;
    }

    .risc-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .risc-NORMAL { background: var(--green-dim); color: var(--green); }
    .risc-CRITIC { background: var(--red-dim);   color: var(--red); }

    /* Graella de prediccions */
    .pred-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .pred-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 6px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .pred-cell.critic {
      border-color: var(--red);
      background: var(--red-dim);
    }

    .pred-hores {
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .pred-hora {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .pred-cabal {
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
    }
    .pred-cell.critic .pred-cabal { color: var(--red); }
    .pred-unitat {
      font-size: 0.58rem;
      color: var(--text-muted);
    }
    .pred-model {
      font-size: 0.55rem;
      color: var(--text-muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Gràfica */
    .chart-wrap {
      position: relative;
      height: 130px;
    }

    /* ── Peu del panell ──────────────────────────── */
    .panel-footer {
      padding: 12px 18px;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Marcadors Leaflet personalitzats ────────── */
    .marker-wrap {
      display: flex; flex-direction: column; align-items: center;
    }
    .marker-bubble {
      background: var(--surface);
      border: 2px solid var(--blue);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      white-space: nowrap;
      font-family: var(--font);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      cursor: pointer;
      min-width: 130px;
    }
    .marker-bubble.critic { border-color: var(--red); }
    .marker-nom  { font-size: 0.7rem; font-weight: 600; color: #e6edf3; }
    .marker-val  { font-size: 1.05rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #2f81f7; }
    .marker-bubble.critic .marker-val { color: var(--red); }
    .marker-sub  { font-size: 0.6rem; color: #7d8590; }
    .marker-risc { font-size: 0.62rem; font-weight: 700; margin-top: 2px; }
    .marker-risc.NORMAL { color: var(--green); }
    .marker-risc.CRITIC { color: var(--red); }
    .marker-stem { width: 2px; height: 10px; background: var(--blue); }
    .marker-bubble.critic + .marker-stem { background: var(--red); }
    .marker-pin  { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
    .marker-bubble.critic ~ .marker-pin { background: var(--red); }

    /* ── No data ─────────────────────────────────── */
    .no-data {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* ── Scrollbar ───────────────────────────────── */
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; height: auto; }
      #panel { max-height: 60vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🌊</div>
    <div>
      <h1>Predicció Cabal — Riu <span>Llobregat</span></h1>
      <div class="header-meta" id="header-ts">Carregant dades...</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="pulse" id="pulse-dot"></div>
    <span id="status-text">Connectant...</span>
  </div>
</header>

<main>
  <div id="map"></div>
  <div id="panel">
    <div class="no-data" id="loading-msg">⏳ Carregant prediccions...</div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────
//  CONFIGURACIÓ
// ─────────────────────────────────────────────

// URL del data.json al GitHub Pages (raw)
// Format: https://raw.githubusercontent.com/alexrodriguezmolla/REPO/main/data.json
const DATA_URL = "https://raw.githubusercontent.com/alexrodriguezmolla/llobregat-prediccio/main/data.json";

const INTERVAL_REFRESC_MS = 30 * 60 * 1000; // 30 minuts

// ─────────────────────────────────────────────
//  MAPA
// ─────────────────────────────────────────────

const map = L.map("map", {
  center: [41.43, 1.97],
  zoom: 11,
  zoomControl: true
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

const markers = {};

function crearIconaMarker(punt) {
  if (!punt.prediccions || punt.prediccions.length === 0) return null;
  const p1    = punt.prediccions[0];
  const esCrit = p1.risc === "CRÍTIC" || p1.risc === "CRITIC";
  const html = `
    <div class="marker-wrap">
      <div class="marker-bubble ${esCrit ? "critic" : ""}">
        <div class="marker-nom">${punt.nom}</div>
        <div class="marker-val">${p1.cabal_m3s.toFixed(1)}</div>
        <div class="marker-sub">m³/s · +1h (${p1.hora_prediccio})</div>
        <div class="marker-risc ${esCrit ? "CRITIC" : "NORMAL"}">${esCrit ? "⚠ CRÍTIC" : "✓ NORMAL"}</div>
      </div>
      <div class="marker-stem"></div>
      <div class="marker-pin"></div>
    </div>`;
  return L.divIcon({ html, className: "", iconAnchor: [65, 72] });
}

function actualitzarMarcadors(dades) {
  dades.punts.forEach(punt => {
    const icona = crearIconaMarker(punt);
    if (!icona) return;
    const latlng = [punt.coord.lat, punt.coord.lon];
    if (markers[punt.id]) {
      markers[punt.id].setLatLng(latlng).setIcon(icona);
    } else {
      markers[punt.id] = L.marker(latlng, { icon: icona }).addTo(map);
    }
    markers[punt.id].on("click", () => {
      document.getElementById(`card-${punt.id}`)?.scrollIntoView({ behavior: "smooth" });
    });
  });
}

// ─────────────────────────────────────────────
//  PANELL LATERAL
// ─────────────────────────────────────────────

const charts = {};

function renderitzarPanell(dades) {
  const panel = document.getElementById("panel");
  panel.innerHTML = "";

  dades.punts.forEach(punt => {
    if (!punt.prediccions || punt.prediccions.length === 0) {
      const div = document.createElement("div");
      div.className = "punt-card";
      div.id = `card-${punt.id}`;
      div.innerHTML = `
        <div class="punt-header">
          <div>
            <div class="punt-nom"><span class="punt-dot"></span>${punt.nom}</div>
            <div class="punt-ts">Sense dades disponibles</div>
          </div>
        </div>
        <div class="no-data">Cap fitxer de predicció trobat</div>`;
      panel.appendChild(div);
      return;
    }

    // Risc màxim de les 6 prediccions
    const riscos   = punt.prediccions.map(p => p.risc.toUpperCase());
    const riscMax  = riscos.includes("CRÍTIC") || riscos.includes("CRITIC") ? "CRITIC" : "NORMAL";
    const tsNet    = punt.timestamp_fitxer
      ? new Date(punt.timestamp_fitxer).toLocaleString("ca-ES", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" })
      : "—";

    // ── Graella de prediccions ──
    let cellesHTML = punt.prediccions.map(p => {
      const esCrit = p.risc.toUpperCase() === "CRÍTIC" || p.risc.toUpperCase() === "CRITIC";
      return `
        <div class="pred-cell ${esCrit ? "critic" : ""}">
          <div class="pred-hores">+${p.hores_vista}h</div>
          <div class="pred-hora">${p.hora_prediccio}</div>
          <div class="pred-cabal">${p.cabal_m3s.toFixed(1)}</div>
          <div class="pred-unitat">m³/s</div>
          <div class="pred-model">${p.model}</div>
        </div>`;
    }).join("");

    const card = document.createElement("div");
    card.className = "punt-card";
    card.id = `card-${punt.id}`;
    card.innerHTML = `
      <div class="punt-header">
        <div>
          <div class="punt-nom">
            <span class="punt-dot" style="background:${riscMax === "CRITIC" ? "var(--red)" : "var(--blue)"}"></span>
            ${punt.nom}
          </div>
          <div class="punt-ts">Fitxer: ${tsNet}</div>
        </div>
        <span class="risc-badge risc-${riscMax}">${riscMax === "CRITIC" ? "⚠ CRÍTIC" : "✓ NORMAL"}</span>
      </div>
      <div class="pred-grid">${cellesHTML}</div>
      <div class="chart-wrap">
        <canvas id="chart-${punt.id}"></canvas>
      </div>`;
    panel.appendChild(card);

    // ── Gràfica ──
    const ctx    = document.getElementById(`chart-${punt.id}`).getContext("2d");
    const labels = punt.prediccions.map(p => `+${p.hores_vista}h\n${p.hora_prediccio}`);
    const vals   = punt.prediccions.map(p => p.cabal_m3s);
    const colors = punt.prediccions.map(p => {
      const c = p.risc.toUpperCase();
      return (c === "CRÍTIC" || c === "CRITIC") ? "rgba(248,81,73,0.85)" : "rgba(47,129,247,0.85)";
    });
    const llindar = punt.llindar_critic;

    if (charts[punt.id]) charts[punt.id].destroy();
    charts[punt.id] = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "Cabal predit (m³/s)",
            data: vals,
            backgroundColor: colors,
            borderRadius: 4,
            borderSkipped: false
          },
          {
            label: "Llindar crític",
            data: Array(vals.length).fill(llindar),
            type: "line",
            borderColor: "rgba(248,81,73,0.6)",
            borderDash: [4, 3],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.parsed.y.toFixed(2)} m³/s`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: "#7d8590", font: { size: 9, family: "JetBrains Mono" } },
            grid:  { color: "#21262d" }
          },
          y: {
            ticks: { color: "#7d8590", font: { size: 9, family: "JetBrains Mono" } },
            grid:  { color: "#21262d" }
          }
        }
      }
    });
  });

  // Peu del panell
  const footer = document.createElement("div");
  footer.className = "panel-footer";
  const seg = Math.round(INTERVAL_REFRESC_MS / 60000);
  footer.innerHTML = `🔄 S'actualitza cada ${seg} min · Dades: <a href="${DATA_URL}" target="_blank" style="color:var(--blue);text-decoration:none;">data.json</a>`;
  panel.appendChild(footer);
}

// ─────────────────────────────────────────────
//  CÀRREGA DE DADES
// ─────────────────────────────────────────────

async function carregarDades() {
  try {
    const r = await fetch(DATA_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const dades = await r.json();

    actualitzarMarcadors(dades);
    renderitzarPanell(dades);

    const ts = new Date(dades.actualitzat).toLocaleString("ca-ES");
    document.getElementById("header-ts").textContent = `Última actualització: ${ts} UTC`;
    document.getElementById("status-text").textContent = "En línia";
    document.getElementById("pulse-dot").className = "pulse";

  } catch (err) {
    console.error("Error carregant dades:", err);
    document.getElementById("status-text").textContent = "Error de connexió";
    document.getElementById("pulse-dot").className = "pulse error";
    document.getElementById("header-ts").textContent = "No s'han pogut carregar les dades";
  }
}

// Càrrega inicial + interval
carregarDades();
setInterval(carregarDades, INTERVAL_REFRESC_MS);
</script>

</body>
</html>
